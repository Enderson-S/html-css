<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iframe</title>
    <style>
        iframe {
            width: 400px;
            height: 400px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Testando o uso de um iframe</h1>
    <p>Acessando o site do 
        <!-- Tamanho padrao do iFrame e 300x150 -->
    <iframe src="https://www.cursoemvideo.com" frameborder="0" height="500" scolling="no"><a href="https://www.cursoemvideo.com" target="_blank"></a>CursoemVideo</iframe>  
    
    para aprender a progamar.</p>

    <p>O site do tambem 

        <iframe src="https://www.google.com/?hl=pt_BR&zx=1774906831520&no_sw_cr=1" frameborder="0"><a href="https://www.google.com/?hl=pt_BR&zx=1774906831520&no_sw_cr=1" target="_blank"></a>Google</iframe>
        
        e muito legal, pena que nao funciona dentro do iframe!</p>

    <p>O repositorio do Guanabara no 

        <iframe src="https://gustavoguanabara.github.io" frameborder="0"><a href="https://gustavoguanabara.github.io" target="_blank"></a>GitHub</iframe>

    tambem e bem legal</p>

</body>
</html>
